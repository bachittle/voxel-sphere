<!DOCTYPE html>
<!--
  icosphere-planet.html — Goal 0.1: the ICOSPHERE DECISION PROBE.

  Question this artifact answers (by eyeball, vs cubed-sphere planet.html):
    1. Do square Minecraft textures survive on hexagonal prism caps?
    2. Does a hex-prism world still read as "Minecraft-like"?

  GRID — Goldberg polyhedron: subdivide an icosahedron, take the dual. Every
  vertex of the triangulation becomes a tile: hexagons everywhere except the
  12 original icosa vertices, which become PENTAGONS (marked magenta here).
  Tile corners are the centroids of the faces around each vertex, so caps and
  walls share exact corner vectors — the surface is watertight by construction.

  TERRAIN — same seeded 3D Perlin fbm as planet.html (continents + ridged
  mountains), amplitude rescaled to this grid's block width so proportions
  match Build 1. Prism columns of constant shell thickness dr ≈ hex width
  (cube-ish cells); no onion, no caves — out of scope for the probe.

  TEXTURES — real MC 16px tiles from the same embedded set as planet.html.
  Caps: the square texture is projected onto the tile's tangent plane and
  radially CROPPED by the hexagon (each tile in its own rotated frame — seams
  don't align on purpose; that's the honest experiment). Sides: prism walls
  are plain rectangles, one quad per shell, textured exactly like Minecraft.

  DIG — click a tile to dig one shell, shift-click to put it back. A demo pit
  is pre-dug at load so prism stacking is visible without interacting.
-->

<script>
/*==GEN==*/  // pure geometry + worldgen + meshing; no DOM, no GL
const GEN=(()=>{
'use strict';
const nm=v=>{const l=Math.hypot(v[0],v[1],v[2]);return[v[0]/l,v[1]/l,v[2]/l];};
const dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const cross=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
const sub=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];

// ---- seeded rng + 3D Perlin (same as planet.html) ----
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;
  return((t^t>>>14)>>>0)/4294967296;};}
function makePerlin(seed){
  const rnd=mulberry32(seed),p=new Uint8Array(512),src=new Uint8Array(256);
  for(let i=0;i<256;i++)src[i]=i;
  for(let i=255;i>0;i--){const j=(rnd()*(i+1))|0,t=src[i];src[i]=src[j];src[j]=t;}
  for(let i=0;i<512;i++)p[i]=src[i&255];
  const fade=t=>t*t*t*(t*(t*6-15)+10);
  function grad(h,x,y,z){const g=h&15;
    const u=g<8?x:y, v=g<4?y:(g===12||g===14?x:z);
    return((g&1)?-u:u)+((g&2)?-v:v);}
  return function(x,y,z){
    const X=Math.floor(x)&255,Y=Math.floor(y)&255,Z=Math.floor(z)&255;
    x-=Math.floor(x);y-=Math.floor(y);z-=Math.floor(z);
    const u=fade(x),v=fade(y),w=fade(z);
    const A=p[X]+Y,AA=p[A]+Z,AB=p[A+1]+Z,B=p[X+1]+Y,BA=p[B]+Z,BB=p[B+1]+Z;
    const l=(a,b,t)=>a+t*(b-a);
    return l(l(l(grad(p[AA],x,y,z),grad(p[BA],x-1,y,z),u),
               l(grad(p[AB],x,y-1,z),grad(p[BB],x-1,y-1,z),u),v),
             l(l(grad(p[AA+1],x,y,z-1),grad(p[BA+1],x-1,y,z-1),u),
               l(grad(p[AB+1],x,y-1,z-1),grad(p[BB+1],x-1,y-1,z-1),u),v),w);};
}

// ---- atlas tiles (8x1 runtime atlas) ----
const T={GRASS:0,GSIDE:1,DIRT:2,STONE:3,SAND:4,SNOW:5,WATER:6};
const ATLAS_COLS=8;
function tileRect(t){return[(t*16+0.5)/(ATLAS_COLS*16),0.5/16,15/(ATLAS_COLS*16),15/16];}

// ---- Goldberg grid: icosahedron -> subdivide -> dual ----
function buildGrid(subdiv){
  const PHI=(1+Math.sqrt(5))/2;
  let v=[[-1,PHI,0],[1,PHI,0],[-1,-PHI,0],[1,-PHI,0],[0,-1,PHI],[0,1,PHI],
    [0,-1,-PHI],[0,1,-PHI],[PHI,0,-1],[PHI,0,1],[-PHI,0,-1],[-PHI,0,1]].map(nm);
  let f=[[0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],[1,5,9],[5,11,4],[11,10,2],
    [10,7,6],[7,1,8],[3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],[4,9,5],[2,4,11],
    [6,2,10],[8,6,7],[9,8,1]];
  for(let s=0;s<subdiv;s++){const mid=new Map(),nf=[];
    const gm=(a,b)=>{const k=a<b?a*4194304+b:b*4194304+a;
      if(mid.has(k))return mid.get(k);
      const m=nm([v[a][0]+v[b][0],v[a][1]+v[b][1],v[a][2]+v[b][2]]);v.push(m);
      mid.set(k,v.length-1);return v.length-1;};
    for(const[a,b,c]of f){const ab=gm(a,b),bc=gm(b,c),ca=gm(c,a);
      nf.push([a,ab,ca],[b,bc,ab],[c,ca,bc],[ab,bc,ca]);}f=nf;}
  // face centroids = tile corners
  const FC=f.map(([a,b,c])=>nm([v[a][0]+v[b][0]+v[c][0],
    v[a][1]+v[b][1]+v[c][1],v[a][2]+v[b][2]+v[c][2]]));
  // vertex -> adjacent faces; edge (a,b) -> its two faces
  const VF=Array.from({length:v.length},()=>[]);
  const EF=new Map();
  const ek=(a,b)=>a<b?a*4194304+b:b*4194304+a;
  f.forEach((tri,fi)=>{
    for(const vi of tri)VF[vi].push(fi);
    for(let e=0;e<3;e++){const k=ek(tri[e],tri[(e+1)%3]);
      if(EF.has(k))EF.get(k).push(fi);else EF.set(k,[fi]);}});
  // tiles: corners sorted CCW (viewed from outside) in a tangent frame
  const tiles=v.map((dir,vi)=>{
    const p=Math.abs(dir[1])<0.9?[0,1,0]:[1,0,0];
    const e1=nm(cross(p,dir)),e2=cross(dir,e1);
    const corners=VF[vi]
      .map(fi=>({fi,a:Math.atan2(dot(FC[fi],e2),dot(FC[fi],e1))}))
      .sort((x,y)=>x.a-y.a).map(o=>FC[o.fi]);
    return{dir,e1,e2,corners,pent:VF[vi].length===5,edges:[]};});
  // per-tile neighbor edges; wall corners = the 2 faces flanking edge (a,b)
  for(const[k,fs]of EF){
    const a=(k/4194304)|0,b=k%4194304;
    const c1=FC[fs[0]],c2=FC[fs[1]];
    tiles[a].edges.push({nb:b,c1,c2});
    tiles[b].edges.push({nb:a,c1,c2});}
  return tiles;
}

// ---- planet: grid + terrain ----
function init(seed,subdiv){
  const tiles=buildGrid(subdiv);
  const nT=tiles.length;
  // block width across flats from equal-area hexes; shells are dr thick
  const area=4*Math.PI/nT,W=Math.sqrt(area/0.866),dr=W;
  const k=(Math.PI/256)/dr;                 // amplitude rescale vs Build 1
  const SEA=Math.max(6,Math.round(57*k));
  const minH=Math.max(2,SEA-Math.round(53*k)),maxH=SEA+Math.max(4,Math.round(25*k));
  const radius=s=>1+(s-SEA)*dr;
  const per=makePerlin(seed);
  const fbm=(x,y,z,fq,oct)=>{let a=0.5,s=0,n=0;
    for(let o=0;o<oct;o++){s+=a*per(x*fq,y*fq,z*fq);n+=a;fq*=2;a*=0.5;}return s/n;};
  const H=new Int16Array(nT);
  for(let t=0;t<nT;t++){
    const[x,y,z]=tiles[t].dir;
    const cont=fbm(x,y,z,1.5,4);
    const mmask=fbm(x+31.4,y+47.2,z+12.9,3.1,3);
    const ridge=1-Math.abs(fbm(x+91.3,y+13.7,z+55.1,4.8,4));
    let hR=cont*26+1.2;
    const mm=Math.min(1,Math.max(0,(mmask-0.02)/0.5));
    hR+=mm*mm*ridge*ridge*22;
    H[t]=Math.max(minH,Math.min(maxH,SEA-1+Math.round(hR*k)));}
  const delta=new Int16Array(nT);            // dug (+) / restored (-) shells
  // direction -> tile lookup: lat/lon buckets, dilated at build time
  const LB=Math.max(48,Math.round(Math.PI/dr)),BB=LB*2;
  const buck=Array.from({length:LB*BB},()=>[]);
  const bIdx=d=>{
    const la=Math.min(LB-1,Math.max(0,Math.floor((Math.asin(Math.max(-1,Math.min(1,d[1])))/Math.PI+0.5)*LB)));
    const lo=((Math.floor((Math.atan2(d[2],d[0])/(2*Math.PI)+0.5)*BB))%BB+BB)%BB;
    return[la,lo];};
  for(let t=0;t<nT;t++){const[la,lo]=bIdx(tiles[t].dir);
    for(let dl=-1;dl<=1;dl++)for(let dm=-1;dm<=1;dm++){
      const l2=la+dl;if(l2<0||l2>=LB)continue;
      buck[l2*BB+((lo+dm)%BB+BB)%BB].push(t);}}
  function lookup(d){
    const[la,lo]=bIdx(d);const cand=buck[la*BB+lo];
    let best=-1,bd=-2;
    for(const t of cand){const dd=dot(tiles[t].dir,d);if(dd>bd){bd=dd;best=t;}}
    if(best<0){for(let t=0;t<nT;t++){const dd=dot(tiles[t].dir,d);
      if(dd>bd){bd=dd;best=t;}}}
    return best;}
  return{seed,subdiv,tiles,nT,W,dr,k,SEA,minH,maxH,radius,H,delta,lookup};
}

const effH=(P,t)=>P.H[t]-P.delta[t];
// cap band thresholds (in shells above sea), scaled like Build 1's biomes
function capTile(P,t){
  const d=P.delta[t];
  if(d<0)return T.STONE;                              // player-restored block
  if(d>0)return d<=Math.max(2,Math.round(3*P.k))?T.DIRT:T.STONE;  // dug floor
  const hRel=effH(P,t)-P.SEA;
  if(hRel<=0)return T.SAND;
  if(hRel<=Math.max(2,Math.round(9*P.k)))return T.GRASS;
  if(hRel<=Math.max(3,Math.round(15*P.k)))return T.STONE;
  return T.SNOW;}
function sideBaseTile(P,t){
  switch(capTile(P,t)){case T.GRASS:return T.GSIDE;case T.SAND:return T.SAND;
    case T.SNOW:return T.SNOW;default:return T.STONE;}}
// wall material of tile t's column at shell s (s counts up from the core)
function wallTile(P,t,s){
  const oh=P.H[t],ds=oh-s;
  if(ds<0)return T.STONE;                              // restored above terrain
  if(ds===0)return sideBaseTile(P,t)===T.GSIDE&&P.delta[t]<=0?T.GSIDE:sideBaseTile(P,t);
  return ds<=Math.max(2,Math.round(3*P.k))?T.DIRT:T.STONE;}

// ---- mesher: interleaved [x y z u v shade pent nx ny nz], u32 indices ----
function MB(){return{V:new Float32Array(1<<16),n:0,I:new Uint32Array(1<<14),ni:0,quads:0};}
function push(mb,vals){
  if(mb.n+vals.length>mb.V.length){const nv=new Float32Array(mb.V.length*2);
    nv.set(mb.V);mb.V=nv;}
  mb.V.set(vals,mb.n);mb.n+=vals.length;}
function idx(mb,vals){
  if(mb.ni+vals.length>mb.I.length){const ni=new Uint32Array(mb.I.length*2);
    ni.set(mb.I);mb.I=ni;}
  mb.I.set(vals,mb.ni);mb.ni+=vals.length;}

function buildMesh(P){
  const op=MB(),wa=MB();
  const UVPAD=1.22;                    // hex circumradius / inradius headroom
  for(let t=0;t<P.nT;t++){
    const tl=P.tiles[t],eh=effH(P,t),capR=P.radius(eh+1);
    // ---- cap: square texture projected on the tangent frame, hex-cropped
    const rect=tileRect(capTile(P,t)),pent=tl.pent?1:0;
    const base=op.n/10,nc=tl.corners.length;
    for(let i=0;i<nc;i++){const c=tl.corners[i];
      const rel=sub(c,tl.dir);
      const u=0.5+dot(rel,tl.e1)/(UVPAD*P.W),vv=0.5+dot(rel,tl.e2)/(UVPAD*P.W);
      push(op,[c[0]*capR,c[1]*capR,c[2]*capR,
        rect[0]+Math.min(1,Math.max(0,u))*rect[2],
        rect[1]+Math.min(1,Math.max(0,vv))*rect[3],
        1.0,pent,tl.dir[0],tl.dir[1],tl.dir[2]]);}
    for(let i=1;i<nc-1;i++){idx(op,[base,base+i,base+i+1]);op.quads++;}
    // ---- walls: one quad per exposed shell per edge (per-shell textures)
    for(const e of tl.edges){
      const nh=effH(P,e.nb);
      if(nh>=eh)continue;
      // outward-facing winding: away from the tile center
      let c1=e.c1,c2=e.c2;
      const cm=nm([c1[0]+c2[0],c1[1]+c2[1],c1[2]+c2[2]]);
      const out=sub(cm,tl.dir);
      const along=sub(c2,c1),n0=cross(along,tl.dir);   // horiz normal if c1->c2 CCW
      if(dot(n0,out)<0){const tmp=c1;c1=c2;c2=tmp;}
      const wn=nm(cross(sub(c2,c1),tl.dir));
      for(let s=nh+1;s<=eh;s++){
        const rLo=P.radius(s),rHi=P.radius(s+1),wr=tileRect(wallTile(P,t,s));
        const b2=op.n/10;
        push(op,[c1[0]*rHi,c1[1]*rHi,c1[2]*rHi,wr[0],wr[1],0.82,pent,wn[0],wn[1],wn[2]]);
        push(op,[c2[0]*rHi,c2[1]*rHi,c2[2]*rHi,wr[0]+wr[2],wr[1],0.82,pent,wn[0],wn[1],wn[2]]);
        push(op,[c2[0]*rLo,c2[1]*rLo,c2[2]*rLo,wr[0]+wr[2],wr[1]+wr[3],0.82,pent,wn[0],wn[1],wn[2]]);
        push(op,[c1[0]*rLo,c1[1]*rLo,c1[2]*rLo,wr[0],wr[1]+wr[3],0.82,pent,wn[0],wn[1],wn[2]]);
        idx(op,[b2,b2+2,b2+1,b2,b2+3,b2+2]);op.quads++;}}
    // ---- water cap at sea level over submerged tiles
    if(eh<P.SEA){
      const wrc=tileRect(T.WATER),bw=wa.n/10;
      for(let i=0;i<nc;i++){const c=tl.corners[i];
        const rel=sub(c,tl.dir);
        const u=0.5+dot(rel,tl.e1)/(UVPAD*P.W),vv=0.5+dot(rel,tl.e2)/(UVPAD*P.W);
        push(wa,[c[0],c[1],c[2],
          wrc[0]+Math.min(1,Math.max(0,u))*wrc[2],
          wrc[1]+Math.min(1,Math.max(0,vv))*wrc[3],
          1.0,0,tl.dir[0],tl.dir[1],tl.dir[2]]);}
      for(let i=1;i<nc-1;i++){idx(wa,[bw,bw+i,bw+i+1]);wa.quads++;}}}
  return{op,wa};
}

// ---- ray -> tile (march the ray, compare radius to column height) ----
function raycast(P,eye,rd){
  const RMAX=P.radius(P.maxH+2);
  const b=dot(eye,rd),c=dot(eye,eye)-RMAX*RMAX;
  const disc=b*b-c;if(disc<0)return -1;
  let tt=Math.max(0,-b-Math.sqrt(disc));
  const step=P.dr*0.3,tEnd=-b+Math.sqrt(disc);
  for(;tt<=tEnd;tt+=step){
    const p=[eye[0]+rd[0]*tt,eye[1]+rd[1]*tt,eye[2]+rd[2]*tt];
    const rr=Math.hypot(p[0],p[1],p[2]);
    if(rr<P.radius(2))return -1;
    if(rr>RMAX)continue;
    const tile=P.lookup(nm(p));
    if(rr<=P.radius(effH(P,tile)+1))return tile;}
  return -1;}

// demo pit: stepped hole near a grassy tile so stacking shows at load
function demoPit(P){
  let best=-1,bd=-2;const aim=nm([0.35,0.45,0.82]);
  for(let t=0;t<P.nT;t++){
    if(capTile(P,t)!==T.GRASS)continue;
    const dd=dot(P.tiles[t].dir,aim);if(dd>bd){bd=dd;best=t;}}
  if(best<0)return;
  const deep=Math.min(4,effH(P,best)-2);
  P.delta[best]=deep;
  P.tiles[best].edges.forEach((e,i)=>{
    P.delta[e.nb]=Math.max(P.delta[e.nb],Math.min(i%2?1:2,effH(P,e.nb)-2));});}

return{T,tileRect,init,effH,buildMesh,raycast,demoPit,capTile};
})();

function perspective(f,a,n,fr){const t=1/Math.tan(f/2),nf=1/(n-fr);

const mainP=prog(`
  attribute vec3 aPos;attribute vec2 aUV;attribute vec2 aSC;attribute vec3 aNrm;

  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,mb.I.subarray(0,mb.ni),gl.STATIC_DRAW);

function freeMesh(m){if(!m)return;gl.deleteBuffer(m.vbo);gl.deleteBuffer(m.ibo);}
function drawMesh(m,alpha){

// ===== texture atlas (8x1, tinted like planet.html) =====
const TINT={grass:'#91BD59',water:'#3F76E4'};
function loadImg(src){return new Promise((res,rej)=>{const im=new Image();
  im.onload=()=>res(im);im.onerror=rej;im.src=src;});}
async function buildAtlas(){

function camEye(){ // inverse of view = translate(-d)·rotX(pitch)·rotY(yaw)
  return[-dist*Math.sin(yaw)*Math.cos(pitch),dist*Math.sin(pitch),
         dist*Math.cos(yaw)*Math.cos(pitch)];}
function clickDig(e){
  if(!P)return;
  const dpr=Math.min(devicePixelRatio||1,2);
  const px=e.clientX*dpr,py=e.clientY*dpr;
  const asp=canvas.width/canvas.height,fov=0.9;
  const ndcX=px/canvas.width*2-1,ndcY=1-py/canvas.height*2;
  const th=Math.tan(fov/2);
  const eyeW=camEye();
  // camera basis (matches the view matrix below)
  const fw=vnorm([-eyeW[0],-eyeW[1],-eyeW[2]]);
  const rt=vnorm([-fw[2],0,fw[0]]);                    // cross(fw, worldUp)
  const up=[rt[1]*fw[2]-rt[2]*fw[1],rt[2]*fw[0]-rt[0]*fw[2],rt[0]*fw[1]-rt[1]*fw[0]];
  const rdW=vnorm([fw[0]+ndcX*th*asp*rt[0]+ndcY*th*up[0],
                   fw[1]+ndcX*th*asp*rt[1]+ndcY*th*up[1],
                   fw[2]+ndcX*th*asp*rt[2]+ndcY*th*up[2]]);
  // to planet frame (planet spins by rotY(theta))
  const eye=rotYv(eyeW,-theta),rd=rotYv(rdW,-theta);
  const tile=GEN.raycast(P,eye,rd);
  if(tile<0)return;
  if(e.shiftKey)P.delta[tile]=Math.max(P.delta[tile]-1,P.H[tile]-P.maxH);
  else P.delta[tile]=Math.min(P.delta[tile]+1,P.H[tile]-2);
  remesh();}

// expose for automated verification
window.PROBE={get P(){return P;},GEN,remesh,digAt:(t,n)=>{P.delta[t]+=n;remesh();},
  cam:(y,p,d)=>{if(y!=null)yaw=y;if(p!=null)pitch=p;if(d!=null)dist=d;},
  get theta(){return theta;},set theta(v){theta=v;},
  cull:on=>on?gl.enable(gl.CULL_FACE):gl.disable(gl.CULL_FACE)};

function resize(){const dpr=Math.min(devicePixelRatio||1,2);
  canvas.width=innerWidth*dpr;canvas.height=innerHeight*dpr;
  gl.viewport(0,0,canvas.width,canvas.height);}
window.addEventListener('resize',resize);

// ===== frame loop =====
gl.enable(gl.DEPTH_TEST);gl.enable(gl.CULL_FACE);
gl.clearColor(0.027,0.031,0.051,1);
const SUNW=vnorm([1,0.35,0]);
let lastT=0,fpsEMA=60,fpsTick=0;
const fpsEl=document.getElementById('fps');
function frame(t){
  requestAnimationFrame(frame);
  const dt=Math.min((t-lastT)/1000,0.1);lastT=t;
  if(dt>0){fpsEMA=fpsEMA*0.95+(1/dt)*0.05;
    if((fpsTick++&15)===0)fpsEl.textContent=fpsEMA.toFixed(0);}
  if(spinEl.checked)theta+=dt*0.08;
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  if(!P)return;
  const asp=canvas.width/canvas.height;
  const proj=perspective(0.9,asp,0.02,120);
  const view=mul(mul(translate(0,0,-dist),rotX(pitch)),rotY(yaw));
  // stars (world frame)
  gl.useProgram(starP);
  gl.uniformMatrix4fv(sU,false,new Float32Array(mul(proj,view)));
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE);gl.depthMask(false);
  gl.bindBuffer(gl.ARRAY_BUFFER,starMesh.vbo);
  gl.enableVertexAttribArray(sPosA);gl.vertexAttribPointer(sPosA,3,gl.FLOAT,false,16,0);
  gl.enableVertexAttribArray(sSA);gl.vertexAttribPointer(sSA,1,gl.FLOAT,false,16,12);
  gl.drawArrays(gl.POINTS,0,starMesh.count);
  gl.depthMask(true);gl.disable(gl.BLEND);
  // planet (model = rotY(theta)); sun expressed in the planet frame
  const mvp=mul(mul(proj,view),rotY(theta));
  const sunP=rotYv(SUNW,-theta);
  gl.useProgram(mainP);
  gl.uniformMatrix4fv(U.uMVP,false,new Float32Array(mvp));
  gl.uniform3f(U.uSun,sunP[0],sunP[1],sunP[2]);
  gl.uniform1i(U.uT,0);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,atlasTex);
  drawMesh(mTerr,1.0);
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
  gl.depthMask(false);
  drawMesh(mWater,0.62);
  gl.depthMask(true);gl.disable(gl.BLEND);
  // leave no mainP attribs enabled for the next frame's star drawArrays
  for(const a of[aPos,aUV,aSC,aNrm])gl.disableVertexAttribArray(a);
}

(async()=>{
  atlasTex=await buildAtlas();
  resize();regenerate();
  requestAnimationFrame(frame);
})();
</script>
